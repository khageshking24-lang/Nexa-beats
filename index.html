<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexa LibMaster Pro v2.3.1 - Khagesh Nexa-System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p: #6366f1; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --t: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); transition: 0.3s; overflow: hidden; height: 100vh; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        .container { max-width: 500px; margin: auto; height: 100vh; display: flex; flex-direction: column; padding: 10px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; font-size: 14px; }
        .btn-p { background: var(--p); color: #fff; }
        .btn-s { background: #64748b; color: #fff; }
        .btn-wa { background: #25d366; color: #fff; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #334155; background: rgba(0,0,0,0.2); color: inherit; outline: none; }
        #scrollArea { flex: 1; overflow-y: auto; padding-bottom: 90px; scrollbar-width: none; }
        #scrollArea::-webkit-scrollbar { display: none; }
        .seat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 10px 0; }
        .seat { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); flex-direction: column; }
        .seat.free { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .seat.taken { background: rgba(239, 68, 68, 0.2); color: #ef4444; border-color: #ef4444; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px; z-index: 10; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { cursor: pointer; font-size: 10px; text-align: center; opacity: 0.6; }
        .nav-item.active { opacity: 1; color: var(--p); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 15px; overflow-y: auto; }
        .trial-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .item-card { padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="trialBox" class="trial-screen hidden glass">
    <h2>Nexa LibMaster Pro</h2>
    <p style="margin:20px 0">Trial Expired. Enter key to activate.</p>
    <input type="text" id="mKey" placeholder="Enter Master Key">
    <button class="btn btn-p" onclick="activate()">Activate Lifetime</button>
</div>

<div class="container">
    <header>
        <div><h2 id="dispLib">LibMaster</h2><small id="liveClock" style="opacity:0.5"></small></div>
        <span onclick="openModal('setsModal')" style="cursor:pointer; font-size:24px">⚙️</span>
    </header>
    <input type="text" id="search" placeholder="Search..." oninput="resetPage()" style="margin-bottom:10px">
    
    <div id="scrollArea" onscroll="trackScroll()">
        <div id="list"></div>
    </div>

    <div id="sModal" class="modal"><div class="glass" style="padding:20px; width:100%; max-width:400px;">
        <h3>Admission</h3>
        <form id="sForm" onsubmit="event.preventDefault(); saveS();">
            <input type="hidden" id="sId"><input type="text" id="sName" placeholder="Name" required><input type="text" id="sPhone" placeholder="WhatsApp No" required><input type="text" id="sSeat" placeholder="Seat No" required><input type="text" id="sShift" placeholder="Shift"><input type="text" id="sAddr" placeholder="Address"><input type="number" id="sFee" placeholder="Fee Amount (₹)"><select id="sStat"><option>Paid</option><option>Due</option></select>
            <div style="display:flex; gap:10px; margin-top:10px;"><button type="button" class="btn btn-s" onclick="closeModal('sModal')">Back</button><button type="submit" class="btn btn-p">Save</button></div>
            <button type="button" id="sDel" class="btn btn-s hidden" style="margin-top:10px; background:#ef4444" onclick="delS()">Delete</button>
        </form>
    </div></div>

    <div id="bModal" class="modal"><div class="glass" style="padding:20px; width:100%; max-width:400px;">
        <h3>Issue Book</h3>
        <form id="bForm" onsubmit="event.preventDefault(); saveB();">
            <input type="hidden" id="bId"><input type="text" id="bTitle" placeholder="Book Title" required><input type="text" id="bTo" placeholder="Student Name" required>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px"><div><small>Issue</small><input type="date" id="bDateI"></div><div><small>Return</small><input type="date" id="bDateR"></div></div>
            <div style="display:flex; gap:10px; margin-top:10px;"><button type="button" class="btn btn-s" onclick="closeModal('bModal')">Back</button><button type="submit" class="btn btn-p">Allot</button></div>
            <button type="button" id="bDel" class="btn btn-s hidden" style="margin-top:10px; background:#ef4444" onclick="delB()">Mark Return</button>
        </form>
    </div></div>

    <div id="setsModal" class="modal"><div class="glass" style="padding:20px; width:100%; max-width:400px;">
        <h3>Settings</h3>
        <input type="text" id="libName" placeholder="Library Name"><input type="text" id="libAddr" placeholder="Address"><input type="number" id="maxSeats" placeholder="Total Seats">
        <button class="btn btn-p" onclick="saveCfg()">Update Profile</button>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0;"><button class="btn btn-s" onclick="exportData()" style="background:#0ea5e9">📤 Export</button><button class="btn btn-s" onclick="document.getElementById('importFile').click()" style="background:#8b5cf6">📥 Import</button></div>
        <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)"><button class="btn btn-s" onclick="genPDF()" style="background:#22c55e; margin-bottom:10px">📄 PDF Report</button><button class="btn btn-s" onclick="resetAll()" style="background:#ef4444">⚠️ Reset All</button><button class="btn btn-s" onclick="closeModal('setsModal')" style="margin-top:15px">Close</button>
        <p style="text-align:center; font-size:10px; margin-top:10px; opacity:0.5">Powered by Khagesh ai-nexa</p>
    </div></div>

    <nav class="nav">
        <div class="nav-item active" id="nHome" onclick="switchV('home')">🪑<br>Seats</div>
        <div class="nav-item" id="nStud" onclick="switchV('studs')">👤<br>Students</div>
        <div class="nav-item" id="nBook" onclick="switchV('books')">📖<br>Books</div>
        <div class="nav-item" id="nStat" onclick="switchV('stats')">📈<br>Stats</div>
    </nav>
</div>

<script>
    let db, studs=[], books=[], cfg={name:"Nexa LibMaster", addr:"", seats:30}, view='home';
    let limit = 20; 
    const MASTER = "Permanentkey63793119";

    const req = indexedDB.open("NexaLib_v2.3", 1);
    req.onupgradeneeded = e => {
        let d = e.target.result;
        d.createObjectStore("studs", {keyPath:"id", autoIncrement:true});
        d.createObjectStore("books", {keyPath:"id", autoIncrement:true});
        d.createObjectStore("meta", {keyPath:"k"});
    };
    req.onsuccess = e => { db = e.target.result; load().then(() => render()); checkTrial(); if(navigator.storage && navigator.storage.persist) navigator.storage.persist(); };

    async function load() {
        return new Promise((resolve) => {
            const tx = db.transaction(["studs", "books", "meta"], "readonly");
            tx.objectStore("studs").getAll().onsuccess = e => studs = e.target.result;
            tx.objectStore("books").getAll().onsuccess = e => books = e.target.result;
            tx.objectStore("meta").get("cfg").onsuccess = e => {
                if(e.target.result) {
                    cfg = e.target.result;
                    document.getElementById('dispLib').innerText = cfg.name;
                    document.getElementById('libName').value = cfg.name;
                    document.getElementById('libAddr').value = cfg.addr;
                    document.getElementById('maxSeats').value = cfg.seats;
                }
            };
            tx.oncomplete = () => resolve();
        });
    }

    function checkTrial() {
        const os = db.transaction("meta").objectStore("meta");
        os.get("perm").onsuccess = ev => {
            if(ev.target.result) return;
            os.get("start").onsuccess = e => {
                let s = e.target.result ? e.target.result.v : null;
                if(!s) { s = Date.now(); db.transaction("meta","readwrite").objectStore("meta").put({k:"start", v:s}); }
                if(7 - Math.floor((Date.now() - s) / 86400000) <= 0) document.getElementById('trialBox').classList.remove('hidden');
            };
        };
    }

    function activate() { if(document.getElementById('mKey').value === MASTER) { db.transaction("meta","readwrite").objectStore("meta").put({k:"perm",v:true}).onsuccess=()=>location.reload(); } else alert("Wrong Key!"); }

    function trackScroll() {
        if(view !== 'studs' && view !== 'books') return;
        const area = document.getElementById('scrollArea');
        if (area.scrollTop + area.clientHeight >= area.scrollHeight - 50) { limit += 20; render(); }
    }

    function resetPage() { limit = 20; render(); }

    function render() {
        const list = document.getElementById('list'); const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        let html = '';
        if(view==='home') {
            document.getElementById('nHome').classList.add('active'); html = '<div class="seat-grid">';
            for(let i=1; i<=cfg.seats; i++){
                let s = studs.find(x => parseInt(x.seat) === i);
                html += `<div class="seat ${s?'taken':'free'}" onclick="${s?`openSEdit(${s.id})`:`openSAdd(${i})`}">${i}${s?`<small>${s.name.split(' ')[0]}</small>`:''}</div>`;
            }
            html += '</div>';
        } else if(view==='studs') {
            document.getElementById('nStud').classList.add('active');
            let filtered = studs.filter(s => s.name.toLowerCase().includes(q) || s.phone.includes(q));
            filtered.slice(0, limit).forEach(s => {
                let msg = `*📢 Fee Reminder: ${cfg.name}*%0A%0AHello *${s.name}*,%0AYour library fee for *Seat No: ${s.seat}* is *${s.status}*.%0A*Amount:* ₹${s.fee}`;
                html += `<div class="item-card glass" onclick="openSEdit(${s.id})"><div><b>S-${s.seat}: ${s.name}</b><br><small>${s.phone} | ₹${s.fee}</small></div><button class="btn btn-wa" style="width:auto; padding:5px 12px; font-size:10px" onclick="event.stopPropagation(); window.open('https://wa.me/91${s.phone}?text=${msg}')">WhatsApp</button></div>`;
            });
        } else if(view==='books') {
            document.getElementById('nBook').classList.add('active'); html = `<button class="btn btn-p" onclick="openBAdd()" style="margin-bottom:10px">+ Issue Book</button>`;
            books.slice(0, limit).forEach(b => html += `<div class="item-card glass" onclick="openBEdit(${b.id})"><div><b>${b.title}</b><br><small>To: ${b.to}</small></div></div>`);
        } else {
            document.getElementById('nStat').classList.add('active');
            let rev = studs.reduce((a,s)=>a+(s.status==='Paid'?Number(s.fee):0),0);
            html = `<div class="glass" style="padding:20px; text-align:center"><p>Total Students</p><h1>${studs.length}</h1><br><p>Books Issued</p><h1>${books.length}</h1><br><p>Paid Revenue</p><h1 style="color:#22c55e">₹${rev}</h1></div>`;
        }
        list.innerHTML = html || '<p style="text-align:center; opacity:0.3; margin-top:30px">No Records</p>';
    }

    function switchV(v) { view = v; limit = 20; document.getElementById('scrollArea').scrollTop = 0; render(); }
    
    async function saveS() {
        const data = { name: document.getElementById('sName').value, phone: document.getElementById('sPhone').value, seat: document.getElementById('sSeat').value, shift: document.getElementById('sShift').value, addr: document.getElementById('sAddr').value, fee: document.getElementById('sFee').value, status: document.getElementById('sStat').value };
        const tx = db.transaction("studs", "readwrite");
        const id = document.getElementById('sId').value;
        if(id) { data.id = Number(id); tx.objectStore("studs").put(data); } 
        else tx.objectStore("studs").add(data);
        
        tx.oncomplete = async () => {
            closeModal('sModal');
            await load();
            render();
        };
    }

    async function saveB() {
        const data = { title: document.getElementById('bTitle').value, to: document.getElementById('bTo').value, dateI: document.getElementById('bDateI').value, dateR: document.getElementById('bDateR').value };
        const tx = db.transaction("books", "readwrite");
        const id = document.getElementById('bId').value;
        if(id) { data.id = Number(id); tx.objectStore("books").put(data); } 
        else tx.objectStore("books").add(data);
        
        tx.oncomplete = async () => {
            closeModal('bModal');
            await load();
            render();
        };
    }

    function saveCfg() { cfg={k:"cfg", name:document.getElementById('libName').value, addr:document.getElementById('libAddr').value, seats:Number(document.getElementById('maxSeats').value)}; db.transaction("meta","readwrite").objectStore("meta").put(cfg).onsuccess=()=>location.reload(); }
    function exportData() { const blob = new Blob([JSON.stringify({ studs, books, cfg })], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `LibMaster_Backup.json`; a.click(); }
    function importData(e) { const reader = new FileReader(); reader.onload = ev => { try { const data = JSON.parse(ev.target.result); const tx = db.transaction(["studs", "books", "meta"], "readwrite"); tx.objectStore("studs").clear(); tx.objectStore("books").clear(); if(data.studs) data.studs.forEach(s => { delete s.id; tx.objectStore("studs").add(s); }); if(data.books) data.books.forEach(b => { delete b.id; tx.objectStore("books").add(b); }); if(data.cfg) tx.objectStore("meta").put({k:"cfg", ...data.cfg}); tx.oncomplete = () => { alert("Import Done!"); location.reload(); }; } catch (err) { alert("Invalid File!"); } }; reader.readAsText(e.target.files[0]); }
    function genPDF() { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text(cfg.name, 105, 15, {align:'center'}); doc.autoTable({ startY: 25, head: [['Seat', 'Name', 'Phone', 'Status', 'Amount']], body: studs.map(s => [s.seat, s.name, s.phone, s.status, s.fee]) }); doc.save("Report.pdf"); }
    function openSAdd(n) { document.getElementById('sForm').reset(); document.getElementById('sSeat').value=n; document.getElementById('sId').value=''; document.getElementById('sDel').classList.add('hidden'); openModal('sModal'); }
    function openSEdit(id) { const s = studs.find(x => x.id === id); document.getElementById('sId').value = s.id; document.getElementById('sName').value = s.name; document.getElementById('sPhone').value = s.phone; document.getElementById('sSeat').value = s.seat; document.getElementById('sShift').value = s.shift; document.getElementById('sAddr').value = s.addr; document.getElementById('sFee').value = s.fee; document.getElementById('sStat').value = s.status; document.getElementById('sDel').classList.remove('hidden'); openModal('sModal'); }
    function openBAdd() { document.getElementById('bForm').reset(); document.getElementById('bId').value=''; document.getElementById('bDel').classList.add('hidden'); openModal('bModal'); }
    function openBEdit(id) { const b = books.find(x => x.id === id); document.getElementById('bId').value = b.id; document.getElementById('bTitle').value = b.title; document.getElementById('bTo').value = b.to; document.getElementById('bDateI').value = b.dateI; document.getElementById('bDateR').value = b.dateR; document.getElementById('bDel').classList.remove('hidden'); openModal('bModal'); }
    function delS() { if(confirm("Delete Student?")) db.transaction("studs","readwrite").objectStore("studs").delete(Number(document.getElementById('sId').value)).onsuccess=async()=>{closeModal('sModal'); await load(); render();}; }
    function delB() { if(confirm("Mark Return?")) db.transaction("books","readwrite").objectStore("books").delete(Number(document.getElementById('bId').value)).onsuccess=async()=>{closeModal('bModal'); await load(); render();}; }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function resetAll() { if(confirm("Wipe Everything?")) { indexedDB.deleteDatabase("NexaLib_v2.3"); location.reload(); } }
    setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleString(); }, 1000);
</script>
</body>
</html>
